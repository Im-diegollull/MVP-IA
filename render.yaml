services:
  - type: web
    name: ia-mvp
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: ia-mvp-api
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ia-mvp-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: ia-mvp-db
    databaseName: ia_mvp
    user: ia_mvp
